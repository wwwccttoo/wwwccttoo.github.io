<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#f8a5c2;--blue:#63cdda;--green:#78e08f;--orange:#f7d794;--red:#e55039;--bg:#faf3f0;--card:#fff;--text:#2d3436;--text2:#636e72;--shadow:0 2px 8px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;padding-bottom:80px;min-height:100vh}
.header{background:linear-gradient(135deg,#f8a5c2,#63cdda);padding:20px 16px 12px;color:#fff;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;margin-bottom:4px}
.header .countdown{font-size:14px;opacity:.9}
.header .user-bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px;opacity:.9}
.header .user-bar button{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:90px;z-index:99;overflow-x:auto}
.tab{flex:none;padding:10px 8px;text-align:center;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:60px;transition:all .2s}
.tab.active{border-bottom-color:var(--pink);color:var(--red);font-weight:600}
.content{padding:12px}
.timeline-bar{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:var(--shadow)}
.timeline-bar h3{font-size:13px;color:var(--text2);margin-bottom:8px}
.progress-wrap{background:#eee;border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--pink),var(--blue));transition:width .3s}
.stats{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text2)}
.item-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--pink)}
.item-card.cat-1{border-left-color:var(--blue)}
.item-card.cat-2{border-left-color:var(--green)}
.item-card.cat-3{border-left-color:var(--orange)}
.item-card.cat-4{border-left-color:#a29bfe}
.item-card.cat-5{border-left-color:#fd79a8}
.item-card.cat-6{border-left-color:#e17055}
.item-card.cat-7{border-left-color:#00b894}
.item-card.done{opacity:.55}
.item-card .top{display:flex;justify-content:space-between;align-items:center}
.item-card .name{font-size:15px;font-weight:600}
.item-card .deadline{font-size:11px;color:var(--text2)}
.item-card .deadline.urgent{color:var(--red);font-weight:600}
.item-card .meta{margin-top:6px;font-size:12px;color:var(--text2)}
.item-card .notes{margin-top:6px;font-size:12px;color:var(--text2);background:#f9f9f9;padding:6px 8px;border-radius:6px;word-break:break-all}
.search-row{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
.search-btn{display:inline-block;font-size:11px;padding:3px 8px;border-radius:12px;background:#f0f0f0;color:var(--text);text-decoration:none;cursor:pointer;border:none}
.search-btn:hover{background:#e0e0e0}
.item-card .actions{margin-top:8px;display:flex;gap:8px;justify-content:flex-end}
.item-card .actions button{border:none;background:none;font-size:18px;cursor:pointer;padding:2px 6px}
.fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#f8a5c2,#63cdda);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px 30px}
.modal h2{font-size:18px;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.form-group textarea{height:60px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pink)}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#f8a5c2,#63cdda);color:#fff}
.btn-secondary{background:#f0f0f0;color:var(--text)}
.btn-danger{background:var(--red);color:#fff;flex:0.5}
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:14px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:14px;font-size:12px;border:1px solid #ddd;background:#fff;cursor:pointer}
.filter-chip.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.suggested{background:#fffbe6;border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px}
.suggested strong{color:var(--red)}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.preset-btn{padding:8px;border:1px dashed #ccc;border-radius:8px;background:none;font-size:12px;cursor:pointer;text-align:left}
.preset-btn:hover{background:#f9f9f9}
/* Links */
.links-section{margin-top:8px}
.link-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:4px 10px;border-radius:14px;text-decoration:none;margin:2px 3px 2px 0;color:#fff;cursor:pointer;border:none;line-height:1.3}
.link-tag-xiaohongshu{background:#fe2c55}.link-tag-weibo{background:#ff8200}.link-tag-douyin{background:#111}.link-tag-bilibili{background:#00a1d6}.link-tag-youtube{background:#ff0000}.link-tag-amazon{background:#ff9900}.link-tag-target{background:#cc0000}.link-tag-walmart{background:#0071dc}.link-tag-taobao{background:#ff5000}.link-tag-jd{background:#e4393c}.link-tag-costco{background:#e31837}.link-tag-buybuybaby{background:#5b9bd5}.link-tag-babylist{background:#ff6b81}.link-tag-other{background:#636e72}
.link-add-row{display:flex;gap:4px;margin-top:6px}
.link-add-row input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.link-add-row button{padding:5px 10px;border:none;border-radius:6px;background:var(--pink);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
/* Price */
.price-section{margin-top:8px;background:#f0faf0;border-radius:8px;padding:8px 10px}
.price-section .price-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:6px}
.price-section .price-current{font-size:16px;font-weight:700;color:#27ae60}
.price-chart{width:100%;height:50px;margin-top:4px}
.price-history-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #eee}
.price-add-row{display:flex;gap:6px;margin-top:6px}
.price-add-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.price-add-row select{padding:6px 4px;border:1px solid #ddd;border-radius:6px;font-size:12px;max-width:50px}
.price-add-row button{padding:6px 12px;border:none;border-radius:6px;background:var(--green);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.price-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:600}
.price-badge.drop{background:#d4efdf;color:#27ae60}
.price-badge.rise{background:#fadbd8;color:var(--red)}
.converted{font-size:10px;color:var(--text2);font-weight:400;margin-left:4px}
/* Phase */
.phase-header{background:#fff;border-radius:10px;padding:8px 12px;margin:14px 0 8px;font-size:14px;font-weight:600;color:var(--text);box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center}
.phase-header .phase-stats{font-size:11px;font-weight:400;color:var(--text2)}
/* FX bar */
.fx-bar{background:#fff;border-bottom:1px solid #eee;padding:6px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2)}
.fx-bar .fx-rate{font-weight:600;color:var(--text)}
.fx-bar .fx-toggle{padding:3px 10px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:11px;cursor:pointer}
.fx-bar .fx-toggle.active{background:var(--pink);color:#fff;border-color:var(--pink)}
/* Budget */
.budget-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.budget-card h3{font-size:14px;margin-bottom:8px}
.budget-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #f5f5f5}
.budget-row .cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.budget-total{font-size:16px;font-weight:700;margin:8px 0 4px}
/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px;text-align:center}
.login-screen h1{font-size:28px;margin-bottom:8px}
.login-screen p{color:var(--text2);margin-bottom:24px;font-size:14px}
.login-btn{display:flex;align-items:center;gap:10px;padding:14px 28px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:16px;cursor:pointer;box-shadow:var(--shadow)}
.login-btn:hover{background:#f9f9f9}
.login-btn img{width:20px;height:20px}
/* Family */
.family-bar{background:#fffbe6;padding:8px 16px;font-size:12px;text-align:center;border-bottom:1px solid #eee}
.family-bar code{background:#fff;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:1px}
.family-bar button{margin-left:8px;padding:2px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:11px;cursor:pointer}
/* Print */
.print-btn{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;margin-left:6px}
@media print{
  .header,.tabs,.fx-bar,.fab,.modal-overlay,.search-row,.price-section,.link-add-row,.actions,.filter-row,.family-bar,.user-bar,.print-btn{display:none!important}
  body{max-width:100%;padding:0}
  .item-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  .item-card.done .name::before{content:"✅ "}
  .phase-header{box-shadow:none;border-bottom:2px solid #333}
}
/* Weekly shopping */
.weekly-card{background:linear-gradient(135deg,#fff5f5,#fff);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--red)}
.weekly-card .wk-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:6px}
.weekly-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.weekly-item button{border:none;background:none;font-size:16px;cursor:pointer}
/* Modal link list */
.modal-link-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.modal-link-item .link-url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#0984e3}
.modal-link-item button{border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px}
</style>
</head>

// ============ Platform Detection ============
const PLATFORMS=[
  {key:'xiaohongshu',patterns:[/xiaohongshu\.com/i,/xhslink\.com/i,/xhs\.cn/i],emoji:'📕',name:'小红书'},
  {key:'weibo',patterns:[/weibo\.com/i,/weibo\.cn/i],emoji:'🔥',name:'微博'},
  {key:'douyin',patterns:[/douyin\.com/i],emoji:'🎵',name:'抖音'},
  {key:'bilibili',patterns:[/bilibili\.com/i,/b23\.tv/i],emoji:'📺',name:'B站'},
  {key:'youtube',patterns:[/youtube\.com/i,/youtu\.be/i],emoji:'▶️',name:'YouTube'},
  {key:'amazon',patterns:[/amazon\.com/i,/amzn\.to/i],emoji:'🛒',name:'Amazon'},
  {key:'target',patterns:[/target\.com/i],emoji:'🎯',name:'Target'},
  {key:'walmart',patterns:[/walmart\.com/i],emoji:'🏪',name:'Walmart'},
  {key:'taobao',patterns:[/taobao\.com/i,/tb\.cn/i,/tmall\.com/i],emoji:'🛍',name:'淘宝'},
  {key:'jd',patterns:[/jd\.com/i],emoji:'🐶',name:'京东'},
  {key:'costco',patterns:[/costco\.com/i],emoji:'🏬',name:'Costco'},
  {key:'buybuybaby',patterns:[/buybuybaby\.com/i],emoji:'🍼',name:'BuyBuyBaby'},
  {key:'babylist',patterns:[/babylist\.com/i],emoji:'📋',name:'Babylist'},
];
function detectPlatform(url){for(const p of PLATFORMS)for(const pat of p.patterns)if(pat.test(url))return p;return{key:'other',emoji:'🔗',name:'链接'};}
function extractASIN(url){if(!url)return null;const pats=[/\/dp\/([A-Z0-9]{10})/i,/\/gp\/product\/([A-Z0-9]{10})/i,/amazon\.com.*?\/([A-Z0-9]{10})(?:\/|$|\?)/i];for(const p of pats){const m=url.match(p);if(m)return m[1];}return null;}
function getItemASIN(item){if(!item.links)return null;for(const l of item.links){const a=extractASIN(typeof l==='string'?l:l.url);if(a)return a;}return null;}
function normalizeLinks(links){if(!links)return[];return links.map(l=>typeof l==='string'?{url:l,memo:''}:l);}

// ============ Exchange Rate ============
let fxRate=parseFloat(localStorage.getItem('bp_fx'))||7.25;
let showDualCurrency=localStorage.getItem('bp_dual')!=='false';
function toUSD(a,c){return c==='¥'?a/fxRate:a;}
function fxLabel(a,c){if(!showDualCurrency)return'';const cv=c==='$'?{s:'¥',a:a*fxRate}:{s:'$',a:a/fxRate};return `<span class="converted">(≈${cv.s}${cv.a.toFixed(2)})</span>`;}
async function fetchFx(){try{if(localStorage.getItem('bp_fxd')===today())return;const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();if(d?.rates?.CNY){fxRate=d.rates.CNY;localStorage.setItem('bp_fx',fxRate);localStorage.setItem('bp_fxd',today());}}catch(e){}}

// ============ Firebase Data ============
async function ensureFamily(){
  const userDoc=await db.collection('users').doc(currentUser.uid).get();
  if(userDoc.exists&&userDoc.data().familyId){
    familyId=userDoc.data().familyId;
  } else {
    // Check URL for invite
    const params=new URLSearchParams(location.search);
    if(params.get('join')){
      familyId=params.get('join');
    } else {
      familyId=genId();
    }
    await db.collection('users').doc(currentUser.uid).set({familyId,email:currentUser.email,name:currentUser.displayName},{merge:true});
  }
  // Add to family members
  await db.collection('families').doc(familyId).set({members:firebase.firestore.FieldValue.arrayUnion(currentUser.uid),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  startListening();
}

function startListening(){
  if(unsubscribe)unsubscribe();
  unsubscribe=db.collection('families').doc(familyId).collection('items').orderBy('deadline')
    .onSnapshot(snap=>{
      items=[];
      snap.forEach(doc=>{const d=doc.data();d.id=doc.id;d.links=normalizeLinks(d.links);if(!d.priceHistory)d.priceHistory=[];items.push(d);});
      renderApp();
    });
}

async function saveItem_fb(item){
  const {id,...data}=item;
  data.updatedAt=firebase.firestore.FieldValue.serverTimestamp();
  data.updatedBy=currentUser.displayName||currentUser.email;
  if(id&&typeof id==='string'&&id.length>5){
    await db.collection('families').doc(familyId).collection('items').doc(id).set(data,{merge:true});
  } else {
    const ref=await db.collection('families').doc(familyId).collection('items').add(data);
    return ref.id;
  }
}

async function deleteItem_fb(id){
  await db.collection('families').doc(familyId).collection('items').doc(id).delete();
}

function searchUrl(name,p){const q=encodeURIComponent(name);return{xiaohongshu:`https://www.xiaohongshu.com/search_result?keyword=${q}`,weibo:`https://s.weibo.com/weibo?q=${q}`,douyin:`https://www.douyin.com/search/${q}`,bilibili:`https://search.bilibili.com/all?keyword=${q}`,amazon:`https://www.amazon.com/s?k=${q}`,target:`https://www.target.com/s?searchTerm=${q}`,taobao:`https://s.taobao.com/search?q=${q}`,jd:`https://search.jd.com/Search?keyword=${q}`,walmart:`https://www.walmart.com/search?q=${q}`,youtube:`https://www.youtube.com/results?search_query=${q}`}[p];}

// ============ Price Helpers ============
function priceStats(ph){if(!ph||!ph.length)return null;const n=ph.map(p=>({...p,usd:toUSD(p.price,p.currency||'$')}));const c=n[n.length-1];const u=n.map(p=>p.usd);const min=Math.min(...u),max=Math.max(...u);const prev=n.length>=2?n[n.length-2].usd:c.usd;return{current:c.price,currency:c.currency||'$',currentUSD:c.usd,min,max,change:c.usd-prev,count:ph.length};}
function drawSparkline(ph){if(!ph||ph.length<2)return'';const prices=ph.map(p=>toUSD(p.price,p.currency||'$')),min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;const w=200,h=40,pad=4,step=(w-2*pad)/(prices.length-1);const pts=prices.map((p,i)=>`${pad+i*step},${h-pad-((p-min)/range)*(h-2*pad)}`);const last=prices[prices.length-1];const color=last<=min*1.05?'#27ae60':last>=max*0.95?'#e55039':'#3498db';return`<svg class="price-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline fill="none" stroke="${color}" stroke-width="2" points="${pts.join(' ')}"/><circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="3" fill="${color}"/></svg>`;}

// ============ Render Helpers ============
function renderLinksSection(item){
  const links=normalizeLinks(item.links);
  let html='<div class="links-section">';
  links.forEach(link=>{const p=detectPlatform(link.url);const memo=link.memo?` · ${escapeHtml(link.memo)}`:'';html+=`<a href="${escapeHtml(link.url)}" target="_blank" class="link-tag link-tag-${p.key}">${p.emoji} ${p.name}${memo}</a>`;});
  const asin=getItemASIN(item);
  if(asin){html+=`<a href="https://camelcamelcamel.com/product/${asin}" target="_blank" class="link-tag" style="background:#9b59b6">🐫 价格历史</a><a href="https://keepa.com/#!product/1-${asin}" target="_blank" class="link-tag" style="background:#2980b9">📊 Keepa</a>`;}
  html+=`<div class="link-add-row"><input id="lu_${item.id}" placeholder="粘贴链接..." style="flex:2"><input id="lm_${item.id}" placeholder="备注" style="flex:1"><button onclick="quickAddLink('${item.id}')">+</button></div></div>`;
  return html;
}

function renderPriceSection(item){
  const st=priceStats(item.priceHistory);
  let html='<div class="price-section"><div class="price-header"><span style="font-weight:600">💰 价格追踪</span>';
  if(st){const s=st.currency==='¥'?'¥':'$';html+=`<span class="price-current">${s}${st.current.toFixed(2)}${fxLabel(st.current,st.currency)}`;if(st.change!==0){const cls=st.change<0?'drop':'rise';html+=`<span class="price-badge ${cls}">${st.change<0?'↓':'↑'}$${Math.abs(st.change).toFixed(2)}</span>`;}html+=`</span>`;}
  html+='</div>';
  if(item.priceHistory?.length>=2){html+=drawSparkline(item.priceHistory);const mr=(st.min*fxRate).toFixed(2),xr=(st.max*fxRate).toFixed(2);html+=`<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:2px"><span>最低:$${st.min.toFixed(2)}${showDualCurrency?' (¥'+mr+')':''}</span><span>最高:$${st.max.toFixed(2)}${showDualCurrency?' (¥'+xr+')':''}</span></div>`;if(st.currentUSD<=st.min*1.05)html+=`<div style="font-size:11px;color:#27ae60;font-weight:600;margin-top:4px">✨ 接近历史最低！考虑入手</div>`;}
  if(item.priceHistory?.length>0){html+='<div style="margin-top:6px">';item.priceHistory.slice(-5).reverse().forEach(p=>{const s=p.currency==='¥'?'¥':'$';html+=`<div class="price-history-row"><span>${p.date}${p.source?' ('+escapeHtml(p.source)+')':''}</span><span>${s}${p.price.toFixed(2)}${showDualCurrency?' '+fxLabel(p.price,p.currency||'$'):''}</span></div>`;});if(item.priceHistory.length>5)html+=`<div style="font-size:10px;color:var(--text2);text-align:center;margin-top:2px">共${item.priceHistory.length}条</div>`;html+='</div>';}
  html+=`<div class="price-add-row"><select id="cur_${item.id}"><option value="$">$</option><option value="¥">¥</option></select><input type="number" step="0.01" placeholder="价格" id="pr_${item.id}" style="max-width:70px"><input type="text" placeholder="来源" id="ps_${item.id}" style="max-width:80px"><button onclick="addPrice('${item.id}')">记录</button></div></div>`;
  return html;
}

function renderItemCard(item){
  const dl=daysUntil(item.deadline),urg=(!item.done&&dl<=14)?'urgent':'',dlt=dl<0?`过期${-dl}天`:dl===0?'今天':`${dl}天`;
  const st=priceStats(item.priceHistory),sym=st?(st.currency==='¥'?'¥':'$'):'',pd=st?` · ${sym}${st.current.toFixed(2)}${fxLabel(st.current,st.currency)}`:'';
  const phTag=item.phase&&currentTab==='all'?`<span style="font-size:10px;background:#f0f0f0;padding:1px 6px;border-radius:6px;margin-left:4px">${escapeHtml(item.phase)}</span>`:'';
  return`<div class="item-card cat-${item.cat} ${item.done?'done':''}"><div class="top"><span class="name">${item.done?'✅ ':''}${escapeHtml(item.name)}${phTag}</span><span class="deadline ${urg}">${item.deadline} (${dlt})</span></div><div class="meta">${CATEGORIES[item.cat]?.emoji||''} ${CATEGORIES[item.cat]?.name||''}${pd}</div>${item.note?`<div class="notes">${escapeHtml(item.note)}</div>`:''}${renderLinksSection(item)}<div class="search-row"><button class="search-btn" onclick="window.open('${searchUrl(item.name,'xiaohongshu')}')">📕小红书</button><button class="search-btn" onclick="window.open('${searchUrl(item.name,'weibo')}')">🔥微博</button><button class="search-btn" onclick="window.open('${searchUrl(item.name,'amazon')}')">🛒Amazon</button><button class="search-btn" onclick="window.open('${searchUrl(item.name,'target')}')">🎯Target</button><button class="search-btn" onclick="window.open('${searchUrl(item.name,'taobao')}')">🛍淘宝</button></div>${renderPriceSection(item)}<div class="actions"><button onclick="toggleDone('${item.id}')">${item.done?'↩️':'✅'}</button><button onclick="openModal('${item.id}')">✏️</button><button onclick="deleteItem('${item.id}')">🗑</button></div></div>`;

  else html+=renderItemList();

  html+=`</div><button class="fab" onclick="openModal()">+</button>`;
  app.innerHTML=html;
}

function renderItemList(){
  let list=currentTab==='all'?[...items]:items.filter(i=>i.cat===currentTab);
  if(currentFilter==='todo')list=list.filter(i=>!i.done);
  if(currentFilter==='done')list=list.filter(i=>i.done);
  if(currentFilter==='urgent')list=list.filter(i=>!i.done&&daysUntil(i.deadline)<=14);
  list.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

  const pool=currentTab==='all'?items:items.filter(i=>i.cat===currentTab);
  const total=pool.length,done=pool.filter(i=>i.done).length;
  let html='';
  if(total>0){const pct=Math.round(done/total*100);html+=`<div class="timeline-bar"><h3>准备进度</h3><div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div><div class="stats"><span>${done}/${total} 已完成</span><span>${pct}%</span></div></div>`;}
  html+=`<div class="filter-row"><span class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">全部</span><span class="filter-chip ${currentFilter==='todo'?'active':''}" onclick="setFilter('todo')">待购</span><span class="filter-chip ${currentFilter==='urgent'?'active':''}" onclick="setFilter('urgent')">紧急</span><span class="filter-chip ${currentFilter==='done'?'active':''}" onclick="setFilter('done')">已买</span></div>`;

  if(list.length===0){
    html+=`<div class="empty">还没有物品，点击右下角 + 添加</div>`;
    if(currentTab!=='all')html+=`<div style="text-align:center;margin-top:10px"><button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="addPresets(${currentTab})">📋 添加推荐清单</button></div>`;
    return html;
  }

  const hasPhases=currentTab!=='all'&&list.some(i=>i.phase);
  if(hasPhases){
    const order=[],map={};
    list.forEach(item=>{const ph=item.phase||'其他';if(!map[ph]){map[ph]=[];order.push(ph);}map[ph].push(item);});
    order.forEach(ph=>{const pi=map[ph],pd=pi.filter(i=>i.done).length;html+=`<div class="phase-header"><span>${ph}</span><span class="phase-stats">${pd}/${pi.length} 完成</span></div>`;pi.forEach(i=>{html+=renderItemCard(i);});});
  } else {
    list.forEach(i=>{html+=renderItemCard(i);});
  }
  return html;
}

function renderWeekly(){
  const now=new Date();const weekEnd=new Date(now);weekEnd.setDate(now.getDate()+7);
  const overdue=items.filter(i=>!i.done&&new Date(i.deadline)<now).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const thisWeek=items.filter(i=>!i.done&&new Date(i.deadline)>=now&&new Date(i.deadline)<=weekEnd).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const next2Weeks=items.filter(i=>!i.done&&new Date(i.deadline)>weekEnd&&daysUntil(i.deadline)<=21).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

  let html='';
  if(overdue.length){
    html+=`<div class="weekly-card" style="border-left-color:var(--red)"><div class="wk-title">⚠️ 已过期 (${overdue.length})</div>`;
    overdue.forEach(i=>{html+=`<div class="weekly-item"><span>${CATEGORIES[i.cat]?.emoji||''} ${escapeHtml(i.name)}</span><span style="color:var(--red)">${i.deadline} <button onclick="toggleDone('${i.id}')">✅</button></span></div>`;});
    html+=`</div>`;
  }
  if(thisWeek.length){
    html+=`<div class="weekly-card"><div class="wk-title">📋 本周待办 (${thisWeek.length})</div>`;
    thisWeek.forEach(i=>{const dl=daysUntil(i.deadline);html+=`<div class="weekly-item"><span>${CATEGORIES[i.cat]?.emoji||''} ${escapeHtml(i.name)}</span><span>${dl}天 <button onclick="toggleDone('${i.id}')">✅</button></span></div>`;});
    html+=`</div>`;
  }
  if(next2Weeks.length){
    html+=`<div class="weekly-card" style="border-left-color:var(--orange)"><div class="wk-title" style="color:var(--orange)">📅 未来两周 (${next2Weeks.length})</div>`;
    next2Weeks.forEach(i=>{const dl=daysUntil(i.deadline);html+=`<div class="weekly-item"><span>${CATEGORIES[i.cat]?.emoji||''} ${escapeHtml(i.name)}</span><span>${dl}天</span></div>`;});
    html+=`</div>`;
  }
  if(!overdue.length&&!thisWeek.length&&!next2Weeks.length) html+=`<div class="empty">近期没有待办事项 🎉</div>`;
  return html;
}

function renderBudget(){
  let html='';
  // Calculate totals per category
  let grandTotal=0;
  const catTotals=CATEGORIES.map(cat=>{
    const catItems=items.filter(i=>i.cat===cat.id&&i.done&&i.priceHistory?.length>0);
    let total=0;
    catItems.forEach(i=>{const last=i.priceHistory[i.priceHistory.length-1];total+=toUSD(last.price,last.currency||'$');});
    grandTotal+=total;
    return{...cat,total,count:catItems.length};
  });

  html+=`<div class="budget-card"><h3>💰 总支出</h3><div class="budget-total">$${grandTotal.toFixed(2)} ${showDualCurrency?`<span class="converted">(≈¥${(grandTotal*fxRate).toFixed(2)})</span>`:''}</div><div style="font-size:11px;color:var(--text2);margin-bottom:8px">${items.filter(i=>i.done).length} 已购 / ${items.length} 总计</div>`;
  catTotals.filter(c=>c.total>0).sort((a,b)=>b.total-a.total).forEach(c=>{
    html+=`<div class="budget-row"><span><span class="cat-dot" style="background:${c.color}"></span>${c.emoji} ${c.name} (${c.count}件)</span><span>$${c.total.toFixed(2)}${showDualCurrency?` (¥${(c.total*fxRate).toFixed(0)})`:''}</span></div>`;
  });
  html+=`</div>`;

  // Pending items with prices
  const pending=items.filter(i=>!i.done&&i.priceHistory?.length>0);
  if(pending.length){
    let pendingTotal=0;
    pending.forEach(i=>{const last=i.priceHistory[i.priceHistory.length-1];pendingTotal+=toUSD(last.price,last.currency||'$');});
    html+=`<div class="budget-card"><h3>🛒 待购预估</h3><div class="budget-total">$${pendingTotal.toFixed(2)} ${showDualCurrency?`<span class="converted">(≈¥${(pendingTotal*fxRate).toFixed(2)})</span>`:''}</div>`;
    pending.sort((a,b)=>{const la=a.priceHistory[a.priceHistory.length-1],lb=b.priceHistory[b.priceHistory.length-1];return toUSD(lb.price,lb.currency||'$')-toUSD(la.price,la.currency||'$');}).forEach(i=>{
      const last=i.priceHistory[i.priceHistory.length-1];const s=last.currency==='¥'?'¥':'$';
      html+=`<div class="budget-row"><span>${CATEGORIES[i.cat]?.emoji||''} ${escapeHtml(i.name)}</span><span>${s}${last.price.toFixed(2)}</span></div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function renderTimeline(){
  const months={};
  items.filter(i=>!i.done).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).forEach(item=>{const m=item.deadline.substring(0,7);if(!months[m])months[m]=[];months[m].push(item);});
  let html='<h3 style="margin-bottom:12px;font-size:16px">📅 待购时间线</h3>';
  if(!Object.keys(months).length)return html+'<div class="empty">所有物品已买齐！🎉</div>';
  Object.keys(months).sort().forEach(m=>{
    const d=new Date(m+'-01');const label=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
    html+=`<div class="timeline-bar"><h3>${label} (${months[m].length}件)</h3>`;
    months[m].forEach(item=>{const dl=daysUntil(item.deadline);const st=priceStats(item.priceHistory);const p=st?` ${st.currency==='¥'?'¥':'$'}${st.current.toFixed(2)}`:'';
      html+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f0f0f0"><span>${CATEGORIES[item.cat]?.emoji||''} ${escapeHtml(item.name)}</span><span style="color:${dl<=14?'var(--red)':'var(--text2)'}">${item.deadline.substring(5)}${p}</span></div>`;});
    html+='</div>';
  });
  return html;
}

// ============ Login ============
function renderLogin(){
  document.getElementById('app').innerHTML=`<div class="login-screen"><h1>👶 Baby Prep</h1><p>夫妻同步的待产准备清单</p><button class="login-btn" onclick="googleLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">用 Google 账号登录</button><p style="margin-top:16px;font-size:12px;color:var(--text2)">登录后数据云端同步，夫妻共享</p></div>`;
}

async function googleLogin(){
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  }catch(e){
    // Try redirect for mobile
    const provider=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithRedirect(provider);
  }
}

function signOut(){auth.signOut();}

// ============ Actions ============
function switchTab(id){currentTab=id==='timeline'||id==='weekly'||id==='budget'||id==='all'?id:parseInt(id);renderApp();}
function setFilter(f){currentFilter=f;renderApp();}
function toggleFx(){showDualCurrency=!showDualCurrency;localStorage.setItem('bp_dual',showDualCurrency);renderApp();}

async function toggleDone(id){
  const item=items.find(i=>i.id===id);
  if(item){item.done=!item.done;await saveItem_fb(item);}
}

async function deleteItem(id){
  if(!confirm('确定删除？'))return;
  await deleteItem_fb(id);
}

async function quickAddLink(itemId){
  const url=document.getElementById(`lu_${itemId}`)?.value.trim();
  const memo=document.getElementById(`lm_${itemId}`)?.value.trim()||'';
  if(!url||!url.startsWith('http')){alert('请输入有效链接');return;}
  const item=items.find(i=>i.id===itemId);if(!item)return;
  if(!item.links)item.links=[];
  item.links.push({url,memo});
  await saveItem_fb(item);
}

async function addPrice(itemId){
  const price=parseFloat(document.getElementById(`pr_${itemId}`)?.value);
  if(isNaN(price)||price<=0){alert('请输入有效价格');return;}
  const item=items.find(i=>i.id===itemId);if(!item)return;
  if(!item.priceHistory)item.priceHistory=[];
  item.priceHistory.push({date:today(),price,currency:document.getElementById(`cur_${itemId}`)?.value||'$',source:document.getElementById(`ps_${itemId}`)?.value.trim()||''});
  await saveItem_fb(item);
}

async function addPresets(cat){
  const presets=PRESETS[cat]||[];
  const existing=new Set(items.filter(i=>i.cat===cat).map(i=>i.name));
  let added=0;
  const batch=db.batch();
  presets.forEach(p=>{
    if(!existing.has(p.name)){
      const ref=db.collection('families').doc(familyId).collection('items').doc();
      batch.set(ref,{name:p.name,cat:cat,deadline:p.deadline,note:p.note||'',phase:p.phase||'',links:[],priceHistory:[],done:false,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:currentUser.displayName||''});
      added++;
    }
  });
  await batch.commit();
  alert(`已添加 ${added} 个推荐物品`);
}

function copyInvite(){
  const url=location.origin+location.pathname+'?join='+familyId;
  navigator.clipboard.writeText(url).then(()=>alert('邀请链接已复制！发给老婆，她打开链接登录后就能同步数据了')).catch(()=>{prompt('复制此链接发给老婆：',url);});
}

// ============ Modal ============
function openModal(id){
  editingId=id||null;
  const item=id?items.find(i=>i.id===id):null;
  const el=document.getElementById('modal');

  let presetsHtml='';
  if(!item){presetsHtml=`<div class="suggested"><strong>快速添加推荐清单：</strong><div class="preset-grid">${CATEGORIES.map(c=>`<button class="preset-btn" onclick="addPresets(${c.id});closeModal()">${c.emoji} ${c.name}</button>`).join('')}</div></div>`;}

  let linksHtml='';
  if(item){
    const links=normalizeLinks(item.links);
    linksHtml=`<div class="form-group"><label>已保存的链接 (${links.length})</label><div style="background:#f9f9f9;border-radius:8px;padding:6px;max-height:150px;overflow-y:auto">`;
    if(!links.length)linksHtml+='<div style="font-size:12px;color:var(--text2);padding:4px">还没有链接</div>';
    links.forEach((link,idx)=>{const p=detectPlatform(link.url);linksHtml+=`<div class="modal-link-item"><span style="font-size:14px">${p.emoji}</span><span class="link-url">${escapeHtml(link.memo||p.name)}</span><button onclick="removeLink('${item.id}',${idx})">×</button></div>`;});
    linksHtml+=`</div></div><div class="form-group"><label>添加新链接</label><div style="display:flex;gap:6px"><input id="modal_lu" placeholder="粘贴链接" style="flex:2;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px"><input id="modal_lm" placeholder="备注" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px"><button onclick="modalAddLink()" style="padding:8px 14px;border:none;border-radius:8px;background:var(--pink);color:#fff;font-size:13px;cursor:pointer">+</button></div></div>`;
  }

  el.innerHTML=`<h2>${item?'编辑':'添加'}物品</h2>${presetsHtml}
    <div class="form-group"><label>物品名称</label><input id="f_name" value="${item?escapeHtml(item.name):''}" placeholder="如：婴儿推车"></div>
    <div class="form-group"><label>分类</label><select id="f_cat">${CATEGORIES.map(c=>`<option value="${c.id}" ${item&&item.cat===c.id?'selected':''}>${c.emoji} ${c.name}</option>`).join('')}</select></div>
    <div class="form-group"><label>阶段</label><input id="f_phase" value="${item?escapeHtml(item.phase||''):''}" placeholder="如：产前准备" list="ph_sug"><datalist id="ph_sug">${[...new Set(items.map(i=>i.phase).filter(Boolean))].map(p=>`<option value="${escapeHtml(p)}">`).join('')}</datalist></div>
    <div class="form-group"><label>截止日期</label><input type="date" id="f_deadline" value="${item?item.deadline:'2025-08-01'}"></div>
    <div class="form-group"><label>备注</label><textarea id="f_note" placeholder="品牌偏好、参考信息等">${item?escapeHtml(item.note):''}</textarea></div>
    ${linksHtml}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      ${item?`<button class="btn btn-danger" onclick="deleteItem('${item.id}');closeModal()">删除</button>`:''}
      <button class="btn btn-primary" onclick="saveItemModal()">保存</button>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
}

async function saveItemModal(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){alert('请输入物品名称');return;}
  const data={name,cat:parseInt(document.getElementById('f_cat').value),phase:document.getElementById('f_phase').value.trim(),deadline:document.getElementById('f_deadline').value,note:document.getElementById('f_note').value.trim()};
  if(editingId){
    const item=items.find(i=>i.id===editingId);
    if(item){Object.assign(item,data);await saveItem_fb(item);}
  } else {
    data.links=[];data.priceHistory=[];data.done=false;data.id=genId();
    await saveItem_fb(data);
  }
  closeModal();
}

async function modalAddLink(){
  if(!editingId)return;
  const url=document.getElementById('modal_lu')?.value.trim();
  const memo=document.getElementById('modal_lm')?.value.trim()||'';
  if(!url||!url.startsWith('http')){alert('请输入有效链接');return;}
  const item=items.find(i=>i.id===editingId);if(!item)return;
  if(!item.links)item.links=[];
  item.links.push({url,memo});
  await saveItem_fb(item);
  openModal(editingId);
}

async function removeLink(itemId,idx){
  const item=items.find(i=>i.id===itemId);
  if(item?.links){item.links.splice(idx,1);await saveItem_fb(item);openModal(itemId);}
}

function closeModal(){document.getElementById('modalOverlay').style.display='none';editingId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

// ============ Auth Listener ============
auth.onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){
    await ensureFamily();
    fetchFx();
  } else {
    if(unsubscribe){unsubscribe();unsubscribe=null;}
    items=[];familyId=null;
    renderApp();
  }
});
